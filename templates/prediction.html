<!doctype html>
<html>
  <head>
    <title>T20 Match Prediction</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="icon" href="{% static 'images/cricket.jpg' %}" />
  </head>
  <body>
    <center>
      <h1>Upload JSON for Prediction</h1>
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="json_file" accept=".json" required /> <br />
        <button type="submit">Predict</button>
      </form>
    </center>
  </body>
</html>
